name: Update Conference Data

on:
  schedule:
    - cron: '0 3 1 * *' # First day of every month at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-conferences:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests bibtexparser tqdm

      - name: Download new conference data from DBLP
        working-directory: rebiber
        run: |
          mkdir -p raw_data
          python download_dblp.py

      - name: Convert new bib files to JSON and update bib_list.txt
        working-directory: rebiber
        run: |
          for bibfile in raw_data/*.bib; do
            [ -f "$bibfile" ] || continue
            basename_no_ext=$(basename "$bibfile" .bib)
            jsonfile="data/${basename_no_ext}.bib.json"
            if [ ! -f "$jsonfile" ]; then
              echo "Converting $bibfile -> $jsonfile"
              python bib2json.py -i "$bibfile" -o "$jsonfile"
              entry="data/${basename_no_ext}.bib.json"
              if ! grep -qxF "$entry" bib_list.txt; then
                echo "$entry" >> bib_list.txt
              fi
            fi
          done

      - name: Update ACL Anthology data
        working-directory: rebiber
        run: |
          echo "Downloading ACL Anthology bib file..."
          curl -fSL https://aclanthology.org/anthology.bib.gz -o raw_data/anthology.bib.gz
          gunzip -f raw_data/anthology.bib.gz
          echo "Converting ACL Anthology bib to JSON..."
          python bib2json.py -i raw_data/anthology.bib -o data/acl.json
          echo "Splitting acl.json to stay under GitHub's 100 MB file limit..."
          python -c "
import json, math, os

with open('data/acl.json') as f:
    data = json.load(f)

for old in [f for f in os.listdir('data') if f.startswith('acl_') and f.endswith('.json')]:
    os.remove(f'data/{old}')

items = list(data.items())
chunk_size = 50000
num_chunks = math.ceil(len(items) / chunk_size)

for i in range(num_chunks):
    chunk = dict(items[i*chunk_size:(i+1)*chunk_size])
    fname = f'data/acl_{i+1}.json'
    with open(fname, 'w') as f:
        json.dump(chunk, f, indent=2)
    print(f'Created {fname} with {len(chunk)} entries')

os.remove('data/acl.json')

with open('bib_list.txt') as f:
    lines = [l for l in f.readlines() if l.strip() and l.strip() != 'data/acl.json' and not l.strip().startswith('data/acl_')]
for i in range(num_chunks):
    lines.append(f'data/acl_{i+1}.json\n')
with open('bib_list.txt', 'w') as f:
    f.writelines(lines)
"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A rebiber/data/ rebiber/bib_list.txt
          if git diff --staged --quiet; then
            echo "No new conference data found"
          else
            git commit -m "chore: update conference data from DBLP and ACL Anthology"
            git pull --rebase
            git push
          fi
