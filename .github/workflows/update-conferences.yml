name: Update Conference Data

on:
  schedule:
    - cron: '0 3 1 * *' # First day of every month at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-conferences:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests bibtexparser tqdm

      - name: Download new conference data from DBLP
        working-directory: rebiber
        run: |
          mkdir -p raw_data
          python download_dblp.py

      - name: Convert new bib files to JSON and update bib_list.txt
        working-directory: rebiber
        run: |
          for bibfile in raw_data/*.bib; do
            [ -f "$bibfile" ] || continue
            basename_no_ext=$(basename "$bibfile" .bib)
            jsonfile="data/${basename_no_ext}.bib.json"
            if [ ! -f "$jsonfile" ]; then
              echo "Converting $bibfile -> $jsonfile"
              python bib2json.py -i "$bibfile" -o "$jsonfile"
              entry="data/${basename_no_ext}.bib.json"
              if ! grep -qxF "$entry" bib_list.txt; then
                echo "$entry" >> bib_list.txt
              fi
            fi
          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rebiber/data/ rebiber/bib_list.txt
          if git diff --staged --quiet; then
            echo "No new conference data found"
          else
            git commit -m "chore: update conference data from DBLP"
            git push
          fi
